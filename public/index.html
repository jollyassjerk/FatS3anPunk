<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FatS3anPunk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #0d0d0d;
  --surface:     #1a1a1a;
  --surface2:    #242424;
  --border:      #333;
  --accent:      #e8ff00;
  --red:         #ff2d55;
  --text:        #f0f0f0;
  --muted:       #666;
  --font-punk:   'Black Ops One', Impact, sans-serif;
  --font-mono:   'Share Tech Mono', 'Courier New', monospace;
}

html, body { height: 100%; background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; }

/* ── Layout ── */
body { display: flex; flex-direction: column; min-height: 100vh; }

header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.75rem 1.25rem;
  border-bottom: 2px solid var(--accent);
  background: var(--surface);
}

.logo { font-family: var(--font-punk); font-size: 1.6rem; letter-spacing: 0.05em; line-height: 1; }
.logo-3 { color: var(--accent); }

main { flex: 1; display: flex; flex-direction: column; max-width: 720px; width: 100%; margin: 0 auto; padding: 1rem; gap: 0.75rem; }

/* ── Now Playing ── */
.now-playing {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  padding: 1rem 1.25rem;
  display: flex; flex-direction: column; gap: 0.3rem;
}

.np-badge {
  display: flex; align-items: center; gap: 0.5rem;
  font-family: var(--font-mono); font-size: 0.75rem; letter-spacing: 0.15em;
}

.live-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--red);
  animation: pulse 1.4s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(255,45,85,0.7); }
  50%      { box-shadow: 0 0 0 6px rgba(255,45,85,0); }
}

.live-badge-txt { color: var(--red); font-weight: bold; }
.hist-badge-txt  { color: var(--muted); }

.np-title  { font-family: var(--font-punk); font-size: 1.5rem; color: var(--text); line-height: 1.1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.np-artist { font-family: var(--font-mono); font-size: 0.9rem; color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Punk rock vandalism effect — crossed-out original + spray-painted replacement */
.np-title.replaced::before {
  content: attr(data-original);
  display: block;
  color: var(--muted);
  text-decoration: line-through;
  font-size: 0.52em;
  line-height: 1;
  opacity: 0.7;
  margin-bottom: 0.18rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.np-title.replaced { color: var(--red); opacity: 0.95; }
.np-artist.replaced::before {
  content: attr(data-original);
  display: block;
  color: var(--muted);
  text-decoration: line-through;
  font-size: 0.78em;
  line-height: 1;
  opacity: 0.7;
  margin-bottom: 0.1rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.np-artist.replaced { color: var(--accent); opacity: 0.95; }

.np-time   { font-family: var(--font-mono); font-size: 0.75rem; color: var(--muted); }

/* ── Media Panel ── */
.media-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  display: block;
  padding: 0.75rem;
}

.yt-stage {
  width: 100%;
  aspect-ratio: 16 / 9;
  border: 1px solid var(--border);
  background: #000;
  overflow: hidden;
}

#yt-player {
  width: 100%;
  height: 100%;
}

.media-hint {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--muted);
  margin-top: 0.35rem;
}

/* ── Controls ── */
.controls {
  display: flex; gap: 0.5rem; align-items: center;
}

button {
  font-family: var(--font-punk); letter-spacing: 0.08em;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text); cursor: pointer; padding: 0.45rem 0.9rem;
  font-size: 0.8rem; text-transform: uppercase;
  transition: background 0.15s;
}
button:hover:not(:disabled) { background: var(--surface2); }
button:disabled { opacity: 0.3; cursor: default; }

.btn-live             { border-color: var(--red); color: var(--red); }
.btn-live.is-live     { background: var(--red); color: #000; }
.btn-settings         { margin-left: auto; font-size: 0.75rem; border-color: var(--muted); color: var(--muted); }
.btn-settings:hover   { border-color: var(--text); color: var(--text); background: var(--surface); }

/* ── Playlist ── */
.playlist { list-style: none; display: flex; flex-direction: column; gap: 1px; }

.pl-row {
  display: flex; align-items: center; gap: 0.6rem;
  padding: 0.55rem 0.75rem;
  background: var(--surface); border: 1px solid transparent;
  cursor: pointer; transition: background 0.12s, border-color 0.12s;
  width: 100%; text-align: left;
}
.pl-row:hover { background: var(--surface2); }
.pl-row.active {
  border-left: 3px solid var(--accent);
  background: var(--surface2);
}

.pl-icon  { font-size: 0.65rem; color: var(--accent); min-width: 12px; }
.pl-title { flex: 1; font-size: 0.88rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pl-artist{ font-family: var(--font-mono); font-size: 0.72rem; color: var(--muted); white-space: nowrap; min-width: 140px; max-width: 260px; overflow: hidden; text-overflow: ellipsis; text-align: right; margin-left: 0.4rem; }
.title-old { text-decoration: line-through; opacity: 0.72; }
.title-new { color: var(--text); }
.artist-old { text-decoration: line-through; opacity: 0.7; }
.artist-arrow { color: var(--accent); padding: 0 0.25rem; }
.pl-time  { font-family: var(--font-mono); font-size: 0.68rem; color: var(--muted); min-width: 60px; text-align: right; }

.pl-empty { color: var(--muted); font-family: var(--font-mono); font-size: 0.85rem; padding: 1rem 0; }

.pl-row.replaced { opacity: 0.95; border-left-color: var(--red); background: rgba(255, 45, 85, 0.1); }
.pl-row.replaced .pl-icon { color: var(--red); }
.pl-row.replaced .pl-time { color: var(--red); opacity: 0.7; }

/* ── Replacements Drawer ── */
.drawer-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  display: flex; align-items: flex-end; justify-content: center;
  z-index: 100;
}
.drawer-overlay[hidden] { display: none; }

.drawer {
  background: var(--surface); border-top: 2px solid var(--accent);
  width: 100%; max-width: 720px; padding: 1.25rem;
  max-height: 70vh; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem;
}

.drawer h2 { font-family: var(--font-punk); font-size: 1.1rem; color: var(--accent); }
.drawer-help { font-family: var(--font-mono); font-size: 0.78rem; color: var(--muted); }

.rules-list { list-style: none; display: flex; flex-direction: column; gap: 0.4rem; }
.rule-item {
  display: flex; align-items: center; gap: 0.5rem;
  font-family: var(--font-mono); font-size: 0.82rem;
  background: var(--surface2); padding: 0.4rem 0.6rem; border: 1px solid var(--border);
}
.rule-item .arrow { color: var(--accent); }
.rule-item .del-btn {
  margin-left: auto; background: none; border: none;
  color: var(--red); cursor: pointer; font-size: 0.85rem; padding: 0;
}
.rule-item .del-btn:hover { color: #fff; background: none; }
.rules-empty { color: var(--muted); font-family: var(--font-mono); font-size: 0.82rem; }

.rule-form { display: flex; gap: 0.5rem; flex-wrap: wrap; }
.rule-form input {
  background: var(--bg); border: 1px solid var(--border); color: var(--text);
  padding: 0.4rem 0.6rem; font-family: var(--font-mono); font-size: 0.82rem;
  flex: 1; min-width: 120px;
}
.rule-form input::placeholder { color: var(--muted); }
.rule-form input:focus { outline: 1px solid var(--accent); }
.rule-form .btn-add { background: var(--accent); color: #000; border-color: var(--accent); }

.drawer-close { align-self: flex-end; background: none; border: 1px solid var(--muted); color: var(--muted); font-size: 0.75rem; cursor: pointer; }
.drawer-close:hover { border-color: var(--text); color: var(--text); background: none; }

/* ── Thumbs up button ── */
.btn-thumbsup {
  margin-left: 0.8rem; background: none; border: none;
  color: var(--accent); cursor: pointer; font-size: 1rem; padding: 0;
  transition: transform 0.15s;
}
.btn-thumbsup:hover { transform: scale(1.2); }
.btn-thumbsup:active { transform: scale(0.95); }

/* ── Legacy hidden YT wrapper (unused now) ── */
#yt-wrap { display: none; }
</style>
</head>
<body>

<header>
  <span class="logo">FatS<span class="logo-3">3</span>anPunk</span>
  <button class="btn-settings" id="btn-settings" aria-label="Replacement rules">⚙ Rules</button>
</header>

<main>

  <!-- Now Playing -->
  <div class="now-playing" id="now-playing">
    <div class="np-badge">
      <span class="live-dot" id="live-dot"></span>
      <span id="badge-txt" class="live-badge-txt">LIVE</span>
      <button id="btn-thumbsup" class="btn-thumbsup" aria-label="Thumbs up on YouTube Music" title="Open in YouTube Music">👍</button>
    </div>
    <div class="np-title"  id="np-title">Waiting for signal…</div>
    <div class="np-artist" id="np-artist"></div>
    <div class="np-time"   id="np-time"></div>
  </div>

  <!-- Media panel -->
  <div class="media-panel" id="media-panel">
    <div class="yt-stage"><div id="yt-player"></div></div>
    <div class="media-hint" id="media-hint">Autoplay may require one click in your browser.</div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button id="btn-prev" disabled aria-label="Previous">◀◀ PREV</button>
    <button id="btn-live" class="btn-live is-live" aria-label="Return to live">● LIVE</button>
    <button id="btn-next" disabled aria-label="Next">NEXT ▶▶</button>
  </div>

  <!-- Playlist -->
  <ol class="playlist" id="playlist" aria-label="Song history">
    <li class="pl-empty">Connecting…</li>
  </ol>

</main>

<!-- Replacements Drawer -->
<div class="drawer-overlay" id="drawer" hidden>
  <div class="drawer">
    <button class="drawer-close" id="btn-close-drawer">✕ Close</button>
    <h2>Replacement Rules</h2>
    <p class="drawer-help">
      When an artist matches <em>From</em>, replace with a random artist from <em>To</em>. Use semicolons for multiple artists.
    </p>
    <ul class="rules-list" id="rules-list"></ul>
    <form class="rule-form" id="rule-form">
      <input name="from" placeholder="From (e.g. Green Day)" required autocomplete="off">
      <input name="to"   placeholder="To   (e.g. Propagandhi; NOFX; Bad Religion)" required autocomplete="off">
      <button type="submit" class="btn-add">+ Add</button>
    </form>
  </div>
</div>

<!-- Hidden YouTube player (legacy mount kept for backward compatibility) -->
<div id="yt-wrap"></div>

<!-- ════════════════════════════════════════════════════════════
     App Logic — vanilla JS, no frameworks
════════════════════════════════════════════════════════════ -->
<script>
'use strict';

// ── YouTube IFrame singleton ─────────────────────────────────────────────────
var ytPlayer  = null;
var ytReady   = false;
var ytPending = null;
var ytPendingSearch = null;
var userInteracted = false;
var songLoadStartedAt = 0;

function markSongLoadStart() {
  songLoadStartedAt = Date.now();
}

function isLikelyTrueTrackEnd() {
  if (!ytReady || !ytPlayer) return false;

  // Ignore ENDED bursts right after a load; YouTube can emit transient state changes.
  if (Date.now() - songLoadStartedAt < 8000) return false;

  var duration = 0;
  var current = 0;

  try {
    duration = Number(ytPlayer.getDuration()) || 0;
    current = Number(ytPlayer.getCurrentTime()) || 0;
  } catch {
    return false;
  }

  // If duration is unknown, avoid fast-forwarding; only allow after a long elapsed period.
  if (duration <= 0) return (Date.now() - songLoadStartedAt) > 120000;

  if (duration < 20) return current >= Math.max(duration - 0.8, duration * 0.95);

  return current >= Math.max(duration * 0.98, duration - 2);
}

(function loadYT() {
  var s = document.createElement('script');
  s.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(s);
})();

window.onYouTubeIframeAPIReady = function () {
  ytPlayer = new YT.Player('yt-player', {
    height: '100%', width: '100%', videoId: '',
    playerVars: {
      autoplay: 1,
      controls: 1,
      disablekb: 0,
      fs: 1,
      rel: 0,
      iv_load_policy: 3,
      modestbranding: 1,
      origin: window.location.origin
    },
    events: {
      onReady: function () {
        ytReady = true;
        if (ytPending) {
          ytPlayer.loadVideoById(ytPending);
          ytPending = null;
          setTimeout(function () { tryPlay(); }, 120);
        }
        if (ytPendingSearch) {
          playArtistSearch(ytPendingSearch);
          ytPendingSearch = null;
        }
      },
      onStateChange: function (e) {
        if (e.data === YT.PlayerState.UNSTARTED) {
          setTimeout(function(){ tryPlay(); }, 220);
        }
        if (e.data === YT.PlayerState.PLAYING) {
          // Update title from the active YouTube video for substituted songs.
          // Guard by videoId so we do not apply stale metadata from a previous track.
          var s = state.currentSong;
          if (s && s.isReplaced && s.videoId) {
            try {
              var data = ytPlayer.getVideoData();
              if (data && data.title && data.video_id === s.videoId) {
                // Strip "- Topic" suffix YouTube adds for auto-generated channels.
                var cleanTitle = data.title.replace(/\s*[-–]\s*Topic$/i, '').trim();
                if (cleanTitle && cleanTitle !== s.title) {
                  s.title = cleanTitle;
                  renderNowPlaying();
                  renderPlaylist();
                }
              }
            } catch (ex) { /* ignore */ }
          }
        }
        if (e.data === YT.PlayerState.ENDED) {
          if (isLikelyTrueTrackEnd()) onSongEnded();
          else setTimeout(function () { tryPlay(); }, 250);
        }
      },
      onError: function (e) { console.warn('[yt] error', e.data); }
    }
  });
};

function tryPlay() {
  if (!ytReady || !ytPlayer) return;
  try { ytPlayer.playVideo(); } catch { /* ignore autoplay block */ }
}

function playSong(videoId) {
  if (!videoId) return;
  if (ytReady && ytPlayer) {
    markSongLoadStart();
    ytPlayer.loadVideoById(videoId);
    setTimeout(function () { tryPlay(); }, 120);
  }
  else { ytPending = videoId; }
}

function playArtistSearch(artistName) {
  if (!artistName) return;
  var query = String(artistName).trim();
  if (!query) return;

  if (!(ytReady && ytPlayer)) {
    ytPendingSearch = query;
    return;
  }

  try {
    // Fallback for substitutions with no known videoId yet.
    markSongLoadStart();
    ytPlayer.loadPlaylist({
      listType: 'search',
      list: query + ' official',
      index: Math.floor(Math.random() * 3)
    });
    setTimeout(function () { tryPlay(); }, 180);
  } catch {
    // If search playlist fails, keep UI responsive and avoid hard crashes.
  }
}

async function resolveVideoIdForArtist(artistName) {
  return resolveVideoIdForSong({ artist: artistName, title: '' });
}

async function resolveVideoIdForSong(songLike) {
  var artist = songLike && songLike.artist ? String(songLike.artist).trim() : '';
  if (!artist) return null;

  var title = songLike && songLike.title ? String(songLike.title).trim() : '';
  var qs = '/api/resolve-video?artist=' + encodeURIComponent(artist);
  if (title) qs += '&title=' + encodeURIComponent(title);

  try {
    var res = await fetch(qs);
    if (!res.ok) return null;
    var data = await res.json();
    return data && data.videoId ? String(data.videoId) : null;
  } catch {
    return null;
  }
}

async function playSongForEntry(song) {
  if (!song) return;
  if (song.videoId) {
    playSong(song.videoId);
    return;
  }

  var queryTitle = song.isReplaced ? (song.originalTitle || song.title || '') : (song.title || '');
  var resolved = await resolveVideoIdForSong({ artist: song.artist, title: queryTitle });
  if (resolved) {
    song.videoId = resolved;
    playSong(resolved);
    return;
  }

  playArtistSearch(song.artist);
}

document.addEventListener('pointerdown', function () {
  if (userInteracted) return;
  userInteracted = true;
  tryPlay();
  var hint = document.getElementById('media-hint');
  if (hint) hint.textContent = 'Playback unlocked.';
}, { once: true });

// ── Replacements ─────────────────────────────────────────────────────────────
// ── Replacements: song cache and vandalism effect ──────────────────────────
var songsByArtist = {};  // { 'Artist': [{ title, videoId }, ...], ... }
var artistAliases = {
  propaghandi: 'propagandhi'
};

function normalizeArtistName(name) {
  return String(name || '')
    .toLowerCase()
    .replace(/\s*\(.*?\)\s*/g, ' ')
    .replace(/\s*\[.*?\]\s*/g, ' ')
    .replace(/\s+(feat\.?|ft\.?|featuring)\s+.*$/g, '')
    .replace(/[\u2013\u2014-].*$/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

function canonicalArtistKey(name) {
  var normalized = normalizeArtistName(name);
  return artistAliases[normalized] || normalized;
}

function cacheArtistSong(artist, title, videoId) {
  if (!artist || !title || !videoId) return;
  var artistKey = canonicalArtistKey(artist);
  if (!songsByArtist[artistKey]) songsByArtist[artistKey] = [];
  // Avoid duplicates
  if (!songsByArtist[artistKey].some(function(s){ return s.title === title; })) {
    songsByArtist[artistKey].push({ title: title, videoId: videoId });
  }
}

function getRules() {
  try { return JSON.parse(localStorage.getItem('punk_rules') || '[]'); } catch { return []; }
}
function saveRules(r) { localStorage.setItem('punk_rules', JSON.stringify(r)); }

function parseReplacementArtists(toField) {
  return String(toField || '')
    .split(';')
    .map(function (s) { return s.trim(); })
    .filter(Boolean);
}

function pickRandomReplacementArtist(toField) {
  var options = parseReplacementArtists(toField);
  if (!options.length) return '';
  return options[Math.floor(Math.random() * options.length)];
}

// Seed defaults on first visit
if (!localStorage.getItem('punk_rules_seeded')) {
  saveRules([{ from: 'Green Day', to: ' Propagandhi; NOFX; Bad Religion; Osker' }, { from: 'Rancid', to: ' Propagandhi; NOFX; Bad Religion; Osker' }]);
  localStorage.setItem('punk_rules_seeded', '1');
}

function applyRules(song) {
  // song = { artist, title, videoId }
  // Returns: { displayArtist, displayTitle, playVideoId, isReplaced }
  var rules = getRules();
  var incomingArtist = canonicalArtistKey(song.artist);
  for (var i = 0; i < rules.length; i++) {
    var r = rules[i];
    if (incomingArtist === canonicalArtistKey(r.from)) {
      var chosenArtist = pickRandomReplacementArtist(r.to);
      if (!chosenArtist) continue;

      // Replacement triggered — find a random cached song by the replacement artist
      var artistKey = canonicalArtistKey(chosenArtist);
      var cached = songsByArtist[artistKey] || [];
      var replacement = cached.length ? cached[Math.floor(Math.random() * cached.length)] : null;
      if (replacement) {
        return {
          displayArtist: chosenArtist,
          displayTitle: replacement.title,
          playVideoId: replacement.videoId,
          originalArtist: song.artist,
          originalTitle: song.title,
          isReplaced: true
        };
      }

      // Last resort: keep display replaced even if we cannot swap playback yet.
      return {
        displayArtist: chosenArtist,
        displayTitle: song.title,
        playVideoId: null,
        originalArtist: song.artist,
        originalTitle: song.title,
        isReplaced: true
      };
    }
  }
  // No replacement — just apply the artist name (cosmetic only)
  return {
    displayArtist: song.artist,
    displayTitle: song.title,
    playVideoId: song.videoId,
    isReplaced: false
  };
}

function resolvePlayableSong(song) {
  if (!song || !song.isReplaced || song.videoId) return song;

  var targetKey = canonicalArtistKey(song.artist);
  var cached = songsByArtist[targetKey] || [];
  if (!cached.length) return song;

  var pick = cached[Math.floor(Math.random() * cached.length)];
  return {
    id: song.id,
    artist: song.artist,
    title: pick.title,
    playedAt: song.playedAt,
    videoId: pick.videoId,
    originalArtist: song.originalArtist,
    originalTitle: song.originalTitle,
    isReplaced: true
  };
}

// ── State ────────────────────────────────────────────────────────────────────
var state = {
  mode: 'live',           // 'live' | 'historical'
  history: [],            // newest first, max 50
  histIdx: 0,             // index into history[] when mode==='historical'
  currentSong: null,
};

function relTime(iso) {
  var d = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
  if (d < 60)   return 'just now';
  if (d < 3600) return Math.floor(d / 60) + 'm ago';
  return Math.floor(d / 3600) + 'h ' + Math.floor((d % 3600) / 60) + 'm ago';
}

// ── Actions ──────────────────────────────────────────────────────────────────
function newLiveSong(song) {
  var applied = applyRules(song);
  // Cache the original song by artist (for future replacements)
  cacheArtistSong(song.artist, song.title, song.videoId);
  
  // Build display object
  var display = {
    id: song.id,
    artist: applied.displayArtist,
    title: applied.displayTitle,
    playedAt: song.playedAt,
    videoId: applied.playVideoId,
    originalArtist: applied.originalArtist,
    originalTitle: applied.originalTitle,
    isReplaced: applied.isReplaced
  };
  
  // Deduplicate
  if (state.history.length && 
      state.history[0].title === display.title && 
      state.history[0].artist === display.artist) return;
  
  state.history.unshift(display);
  if (state.history.length > 50) state.history.pop();
  
  if (state.mode === 'live') {
    state.currentSong = display;
    playSongForEntry(display);
  }
  render();
}

function playHistorical(idx) {
  var song = state.history[idx];
  if (!song) return;

  var resolvedSong = resolvePlayableSong(song);
  if (resolvedSong !== song) {
    state.history[idx] = resolvedSong;
    song = resolvedSong;
  }

  state.mode     = 'historical';
  state.histIdx  = idx;
  state.currentSong = song;
  playSongForEntry(song);
  render();
}

function returnToLive() {
  state.mode    = 'live';
  state.histIdx = 0;
  state.currentSong = resolvePlayableSong(state.history[0] || null);
  if (state.currentSong && state.history.length) {
    state.history[0] = state.currentSong;
  }
  if (state.currentSong) playSongForEntry(state.currentSong);
  render();
}

function onSongEnded() {
  if (state.mode !== 'historical') return;
  // Advance toward the most recent song (lower index)
  if (state.histIdx > 0) {
    playHistorical(state.histIdx - 1);
  } else {
    returnToLive();
  }
}

// ── Render ───────────────────────────────────────────────────────────────────
var tickTimer = null;

function render() {
  renderNowPlaying();
  renderControls();
  renderPlaylist();
}

function renderNowPlaying() {
  var s     = state.currentSong;
  var live  = state.mode === 'live';

  document.getElementById('badge-txt').textContent = live ? 'LIVE' : 'HISTORICAL';
  document.getElementById('badge-txt').className   = live ? 'live-badge-txt' : 'hist-badge-txt';
  document.getElementById('live-dot').style.animation = live ? '' : 'none';
  document.getElementById('live-dot').style.background = live ? '' : 'var(--muted)';

  if (s) {
    var titleEl  = document.getElementById('np-title');
    var artistEl = document.getElementById('np-artist');
    
    titleEl.textContent = s.title;
    artistEl.textContent = s.artist;
    
    if (s.isReplaced) {
      titleEl.classList.add('replaced');
      titleEl.setAttribute('data-original', s.originalTitle);
      artistEl.classList.add('replaced');
      artistEl.setAttribute('data-original', s.originalArtist);
    } else {
      titleEl.classList.remove('replaced');
      titleEl.removeAttribute('data-original');
      artistEl.classList.remove('replaced');
      artistEl.removeAttribute('data-original');
    }
    
    document.getElementById('np-time').textContent = relTime(s.playedAt);
    document.title = s.artist + ' — ' + s.title + ' | FatS3anPunk';
  }
}

function renderControls() {
  var live = state.mode === 'live';
  var idx  = state.histIdx;
  var len  = state.history.length;

  document.getElementById('btn-live').className = 'btn-live' + (live ? ' is-live' : '');
  document.getElementById('btn-live').textContent = live ? '● LIVE' : '▶ LIVE';
  document.getElementById('btn-prev').disabled = idx >= len - 1;
  document.getElementById('btn-next').disabled = live;
}

function renderPlaylist() {
  var pl  = document.getElementById('playlist');
  var cur = state.currentSong;

  if (!state.history.length) {
    pl.innerHTML = '<li class="pl-empty">No songs yet…</li>';
    return;
  }

  pl.innerHTML = state.history.map(function (s, i) {
    var active = cur && s.id === cur.id;
    var titleDisplay = s.isReplaced
      ? '<span class="title-old">' + esc(s.originalTitle || '') + '</span><span class="artist-arrow">→</span><span class="title-new">' + esc(s.title) + '</span>'
      : esc(s.title);
    var artistDisplay = s.isReplaced ? 
      '<span class="artist-old">' + esc(s.originalArtist) + '</span><span class="artist-arrow">→</span>' + esc(s.artist) :
      esc(s.artist);
    return '<li>' +
      '<button class="pl-row' + (active ? ' active' : '') + (s.isReplaced ? ' replaced' : '') +
        '" onclick="playHistorical(' + i + ')" aria-current="' + (active ? 'true' : 'false') + '">' +
        '<span class="pl-icon">' + (active ? '▶' : '') + '</span>' +
        '<span class="pl-title">' + titleDisplay  + '</span>' +
        '<span class="pl-artist">' + artistDisplay + '</span>' +
        '<span class="pl-time">'  + relTime(s.playedAt) + '</span>' +
      '</button>' +
    '</li>';
  }).join('');
}

function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── Controls wiring ──────────────────────────────────────────────────────────
document.getElementById('btn-live').addEventListener('click', returnToLive);

document.getElementById('btn-prev').addEventListener('click', function () {
  if (state.histIdx < state.history.length - 1) playHistorical(state.histIdx + 1);
});

document.getElementById('btn-next').addEventListener('click', function () {
  if (state.histIdx > 0) playHistorical(state.histIdx - 1);
  else returnToLive();
});

document.getElementById('btn-thumbsup').addEventListener('click', function () {
  if (!state.currentSong || !state.currentSong.videoId) return;
  // Open YouTube Music with the song (user can then thumbs up if logged in)
  var url = 'https://music.youtube.com/watch?v=' + encodeURIComponent(state.currentSong.videoId);
  window.open(url, '_blank');
});

// ── Replacements drawer ──────────────────────────────────────────────────────
var drawer = document.getElementById('drawer');

function renderRules() {
  var rules = getRules();
  var list  = document.getElementById('rules-list');
  if (!rules.length) {
    list.innerHTML = '<div class="rules-empty">No rules yet.</div>';
    return;
  }
  list.innerHTML = rules.map(function (r, i) {
    return '<li class="rule-item">' +
      esc(r.from) + ' <span class="arrow">→</span> ' + esc(r.to) +
      '<button class="del-btn" onclick="deleteRule(' + i + ')">✕</button>' +
      '</li>';
  }).join('');
}

window.deleteRule = function (i) {
  var rules = getRules();
  rules.splice(i, 1);
  saveRules(rules);
  renderRules();
};

document.getElementById('btn-settings').addEventListener('click', function () {
  drawer.hidden = false; renderRules();
});
document.getElementById('btn-close-drawer').addEventListener('click', function () { drawer.hidden = true; });
drawer.addEventListener('click', function (e) { if (e.target === drawer) drawer.hidden = true; });

document.getElementById('rule-form').addEventListener('submit', function (e) {
  e.preventDefault();
  var fd   = new FormData(e.target);
  var from = (fd.get('from') || '').trim();
  var to   = (fd.get('to')   || '').trim();
  if (!from || !to) return;
  var rules = getRules();
  // Prevent duplicate from-entries
  if (!rules.some(function(r){ return r.from.toLowerCase() === from.toLowerCase(); })) {
    rules.push({ from: from, to: to });
    saveRules(rules);
  }
  e.target.reset();
  renderRules();
});

// ── SSE connection ───────────────────────────────────────────────────────────
var es = null;
var esRetryMs = 2000;

function connectSSE() {
  if (es) { es.close(); }
  es = new EventSource('/api/live');

  es.addEventListener('message', function (e) {
    try {
      var msg = JSON.parse(e.data);
      if (msg.type === 'now_playing') { newLiveSong(msg.song); esRetryMs = 2000; }
    } catch { /* ignore */ }
  });

  es.onerror = function () {
    es.close();
    setTimeout(function () {
      esRetryMs = Math.min(esRetryMs * 2, 30_000);
      connectSSE();
    }, esRetryMs);
  };
}

// ── Bootstrap history from REST then open SSE ────────────────────────────────
fetch('/api/history')
  .then(function (r) { return r.json(); })
  .then(function (data) {
    var songs = (data.songs || []).slice(0, 10);
    // Load newest-first (server already returns newest first)
    songs.forEach(function (s) {
      // Cache the song by artist first
      cacheArtistSong(s.artist, s.title, s.videoId);
      // Apply replacement rules
      var applied = applyRules(s);
      var display = {
        id: s.id,
        artist: applied.displayArtist,
        title: applied.displayTitle,
        playedAt: s.playedAt,
        videoId: applied.playVideoId,
        originalArtist: applied.originalArtist,
        originalTitle: applied.originalTitle,
        isReplaced: applied.isReplaced
      };
      state.history.push(display);
    });
    state.currentSong = state.history[0] || null;
    if (state.currentSong && state.currentSong.videoId) {
      playSongForEntry(state.currentSong);
    }
    render();
  })
  .catch(function () { /* SSE will cover us */ })
  .finally(function () { connectSSE(); });

// ── Relative timestamp refresh every 60s ────────────────────────────────────
setInterval(function () {
  if (state.currentSong) renderNowPlaying();
  renderPlaylist();
}, 60_000);
</script>
